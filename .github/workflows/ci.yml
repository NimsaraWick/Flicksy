name: CI # Name of the workflow

on:
  # Trigger the workflow on push or pull request to main/master branches
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job for Backend Unit Tests
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Clone the repo
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Cache dependencies for speed
      - name: Install dependencies
        run: npm install --prefix backend
      - name: Run backend tests
        run: npm run test --prefix backend

  # Job for Frontend Unit Tests and Build check
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --prefix frontend
      - name: Run frontend tests
        run: npm run test --prefix frontend
      - name: Build frontend
        run: npm run build --prefix frontend

  # Job for End-to-End Tests (Depends on unit tests passing)
  e2e-test:
    needs: [backend-test, frontend-test] # Run only after unit tests succeed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root dependencies
        run: npm install --legacy-peer-deps
      - name: Install backend dependencies
        run: npm install --prefix backend
      - name: Install frontend dependencies
        run: npm install --prefix frontend
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          VITE_API_URL: http://localhost:5000
          PORT: 5000
